name = "reallog-ai"
main = "worker/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./web"

[[d1_databases]]
binding = "DB"
database_name = "reallog-db"
database_id = ""

[[kv_namespaces]]
binding = "KV"
id = ""

[vars]
ENVIRONMENT = "production"
THEME = "reallog"
DOMAIN = "real-log"
